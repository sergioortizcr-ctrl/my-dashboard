<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sortiz ToDo — Task Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #4338ca;
      --bg: #f4f5f7; --card: #fff; --text: #1a1a2e; --muted: #6b7280;
      --critical: #dc2626; --high: #f59e0b; --medium: #3b82f6; --low: #9ca3af;
      --pending: #f59e0b; --in_progress: #3b82f6; --review: #8b5cf6;
      --blocked: #ef4444; --completed: #10b981; --cancelled: #9ca3af;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

    /* ---------- AUTH ---------- */
    #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .auth-box { background: var(--card); border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .auth-box h1 { font-size: 26px; text-align: center; margin-bottom: 6px; }
    .auth-box p { color: var(--muted); text-align: center; margin-bottom: 24px; font-size: 14px; }
    input, select, textarea {
      width: 100%; padding: 12px 13px; border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 15px; margin-bottom: 12px; outline: none; font-family: inherit; background: #fff; color: var(--text);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 70px; }
    .btn { width: 100%; padding: 13px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .auth-links { text-align: center; margin-top: 16px; font-size: 13.5px; color: var(--muted); }
    .auth-links a { color: var(--primary); cursor: pointer; font-weight: 500; display: inline-block; margin: 4px 8px; }
    .error-msg { color: #ef4444; font-size: 13px; margin-bottom: 10px; text-align: center; display: none; }

    /* ---------- APP LAYOUT ---------- */
    #app { display: none; }
    header {
      background: var(--primary); color: #fff; padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    header h2 { font-size: 18px; }
    #signout-btn { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: 13px; }

    nav { display: flex; background: var(--card); border-bottom: 1px solid #e5e7eb; overflow-x: auto; position: sticky; top: 48px; z-index: 40; }
    .nav-tab {
      padding: 13px 18px; border: none; background: none; cursor: pointer;
      font-size: 14px; font-weight: 500; color: var(--muted); white-space: nowrap;
      border-bottom: 2.5px solid transparent;
    }
    .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .container { max-width: 1100px; margin: 0 auto; padding: 18px 14px 110px; }
    .view { display: none; }
    .view.active { display: block; }

    /* ---------- FILTER BAR ---------- */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 130px; margin-bottom: 0; padding: 9px 11px; font-size: 13.5px; }

    /* ---------- TASK CARDS (LIST) ---------- */
    .card {
      background: var(--card); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,.05); cursor: pointer; border-left: 4px solid transparent;
      transition: box-shadow .15s;
    }
    .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-title.done { text-decoration: line-through; color: var(--muted); }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; color: #fff; }
    .badge.outline { background: #f3f4f6 !important; color: var(--muted); border: 1px solid #e5e7eb; }
    .card-due { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .card-due.overdue { color: #dc2626; font-weight: 600; }
    .empty { text-align: center; color: var(--muted); margin-top: 50px; font-size: 15px; }

    /* ---------- KANBAN ---------- */
    .kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; align-items: flex-start; }
    .kanban-col { background: #ebecf0; border-radius: 12px; min-width: 230px; width: 230px; flex-shrink: 0; padding: 10px; }
    .kanban-col h4 { font-size: 13px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .kanban-col h4 .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .kanban-col .count { color: var(--muted); font-weight: 500; }
    .kanban-card {
      background: #fff; border-radius: 9px; padding: 10px 12px; margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: grab; font-size: 13.5px;
    }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card .kc-meta { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .kanban-col.drag-over { outline: 2px dashed var(--primary); outline-offset: -2px; }

    /* ---------- CALENDAR ---------- */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .cal-header h3 { font-size: 17px; }
    .cal-nav { background: var(--card); border: 1px solid #e5e7eb; border-radius: 8px; padding: 7px 13px; cursor: pointer; font-size: 14px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 5px 0; text-transform: uppercase; }
    .cal-day { background: var(--card); border-radius: 8px; min-height: 76px; padding: 5px; font-size: 12px; }
    .cal-day.other { opacity: .4; }
    .cal-day.today { outline: 2px solid var(--primary); }
    .cal-day .d { font-weight: 600; margin-bottom: 3px; }
    .cal-task {
      font-size: 10.5px; color: #fff; border-radius: 5px; padding: 2px 5px;
      margin-bottom: 2px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ---------- DASHBOARD ---------- */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat-card { background: var(--card); border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 5px rgba(0,0,0,.05); }
    .stat-card .num { font-size: 30px; font-weight: 700; }
    .stat-card .lbl { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .chart-box { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 5px rgba(0,0,0,.05); }
    .chart-box h4 { font-size: 14px; margin-bottom: 14px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; font-size: 13px; }
    .bar-row .bar-label { width: 95px; flex-shrink: 0; color: var(--muted); }
    .bar-track { flex: 1; background: #f3f4f6; border-radius: 6px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; min-width: 2px; transition: width .3s; }
    .bar-row .bar-num { width: 28px; text-align: right; font-weight: 600; }

    /* ---------- FAB & MODAL ---------- */
    #add-btn {
      position: fixed; bottom: 26px; right: 22px; width: 58px; height: 58px; border-radius: 50%;
      background: var(--primary); color: #fff; font-size: 30px; border: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(79,70,229,.4); z-index: 60; line-height: 1;
    }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: flex-end; justify-content: center; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 22px 36px; width: 100%; max-width: 620px; max-height: 92vh; overflow-y: auto; }
    .modal h3 { font-size: 19px; margin-bottom: 16px; }
    .form-row { display: flex; gap: 10px; }
    .form-row > * { flex: 1; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; display: block; }
    .modal-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 8px; }
    .modal-actions .right { display: flex; gap: 10px; }
    .btn-cancel { padding: 11px 16px; border-radius: 10px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; }
    .btn-save { padding: 11px 22px; border-radius: 10px; background: var(--primary); color: #fff; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-delete { padding: 11px 14px; border-radius: 10px; background: #fff; color: #dc2626; border: 1.5px solid #fecaca; cursor: pointer; font-size: 14px; }

    /* comments */
    #comments-section { margin-top: 18px; border-top: 1px solid #eee; padding-top: 14px; }
    #comments-section h4 { font-size: 14px; margin-bottom: 10px; }
    .comment { background: #f8f9fb; border-radius: 9px; padding: 9px 12px; margin-bottom: 8px; font-size: 13.5px; }
    .comment .c-date { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .comment-form { display: flex; gap: 8px; }
    .comment-form input { margin-bottom: 0; flex: 1; }
    .comment-form button { width: auto; padding: 0 18px; }

    @media (min-width: 640px) { .modal-overlay { align-items: center; padding: 20px; } .modal { border-radius: 20px; } }
    @media (max-width: 560px) { .form-row { flex-direction: column; gap: 0; } }
  </style>
</head>
<body>

<!-- ========== AUTH ========== -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>Sortiz ToDo</h1>
    <p id="auth-subtitle">Sign in to continue</p>
    <div id="auth-error" class="error-msg"></div>
    <div id="auth-form">
      <input id="email" type="email" placeholder="Email" autocomplete="email" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button class="btn" id="auth-btn" onclick="handleAuth()">Sign In</button>
      <div class="auth-links">
        <a onclick="toggleMode()" id="toggle-link">Don't have an account? Sign up</a><br>
        <a onclick="forgotPassword()">Forgot password?</a>
      </div>
    </div>
    <div id="recovery-form" style="display:none">
      <input id="new-password" type="password" placeholder="New password" />
      <button class="btn" onclick="setNewPassword()">Update password</button>
    </div>
  </div>
</div>

<!-- ========== APP ========== -->
<div id="app">
  <header>
    <h2>Sortiz ToDo</h2>
    <button id="signout-btn" onclick="db.auth.signOut()">Sign out</button>
  </header>

  <nav>
    <button class="nav-tab active" onclick="switchView('dashboard', this)">📊 Dashboard</button>
    <button class="nav-tab" onclick="switchView('list', this)">📋 Tasks</button>
    <button class="nav-tab" onclick="switchView('kanban', this)">🗂️ Kanban</button>
    <button class="nav-tab" onclick="switchView('calendar', this)">📅 Calendar</button>
  </nav>

  <div class="container">
    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="chart-box"><h4>Tasks by status</h4><div id="chart-status"></div></div>
      <div class="chart-box"><h4>Tasks by priority (open tasks)</h4><div id="chart-priority"></div></div>
      <div class="chart-box"><h4>Open tasks by department</h4><div id="chart-dept"></div></div>
    </div>

    <!-- LIST -->
    <div class="view" id="view-list">
      <div class="filter-bar">
        <input id="f-search" type="text" placeholder="🔍 Search…" oninput="renderList()" />
        <select id="f-status" onchange="renderList()"><option value="">All statuses</option></select>
        <select id="f-priority" onchange="renderList()"><option value="">All priorities</option></select>
        <select id="f-dept" onchange="renderList()"><option value="">All departments</option></select>
        <select id="f-project" onchange="renderList()"><option value="">All projects</option></select>
      </div>
      <div id="items-list"></div>
    </div>

    <!-- KANBAN -->
    <div class="view" id="view-kanban">
      <div class="kanban" id="kanban-board"></div>
    </div>

    <!-- CALENDAR -->
    <div class="view" id="view-calendar">
      <div class="cal-header">
        <button class="cal-nav" onclick="calMove(-1)">‹ Prev</button>
        <h3 id="cal-title"></h3>
        <button class="cal-nav" onclick="calMove(1)">Next ›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <button id="add-btn" onclick="openModal()">＋</button>
</div>

<!-- ========== TASK MODAL ========== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">New Task</h3>
    <label class="field-label">Title *</label>
    <input id="t-title" type="text" placeholder="Task title" />
    <label class="field-label">Description</label>
    <textarea id="t-desc" placeholder="Details…"></textarea>
    <div class="form-row">
      <div><label class="field-label">Status</label><select id="t-status"></select></div>
      <div><label class="field-label">Priority</label><select id="t-priority"></select></div>
      <div><label class="field-label">Due date</label><input id="t-due" type="date" /></div>
    </div>
    <div class="form-row">
      <div><label class="field-label">Department</label><input id="t-dept" list="dl-dept" placeholder="e.g. Operations" /></div>
      <div><label class="field-label">Client</label><input id="t-client" list="dl-client" placeholder="e.g. ACME" /></div>
      <div><label class="field-label">Project</label><input id="t-project" list="dl-project" placeholder="e.g. Plant Audit" /></div>
    </div>
    <label class="field-label">Tags (comma separated)</label>
    <input id="t-tags" type="text" placeholder="urgent, follow-up" />
    <datalist id="dl-dept"></datalist><datalist id="dl-client"></datalist><datalist id="dl-project"></datalist>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteTask()">Delete</button>
      <div class="right">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="btn-save" onclick="saveTask()">Save</button>
      </div>
    </div>

    <div id="comments-section" style="display:none">
      <h4>💬 Comments</h4>
      <div id="comments-list"></div>
      <div class="comment-form">
        <input id="c-body" type="text" placeholder="Write a comment…" />
        <button class="btn" onclick="addComment()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://vzkljtrozljqbizgotle.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2xqdHJvemxqcWJpemdvdGxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDIzMjMsImV4cCI6MjA5NjY3ODMyM30.AYaXB_81Zpg15PCrpZsO0SCPeK955Rp-f5QMmnuwI4c';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const STATUSES   = ['pending','in_progress','review','blocked','completed','cancelled'];
  const S_LABEL    = { pending:'Pending', in_progress:'In Progress', review:'Review', blocked:'Blocked', completed:'Completed', cancelled:'Cancelled' };
  const PRIORITIES = ['critical','high','medium','low'];
  const P_LABEL    = { critical:'Critical', high:'High', medium:'Medium', low:'Low' };
  const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue('--'+n).trim();

  let tasks = [];
  let isSignUp = false;
  let editingId = null;
  let calDate = new Date();
  let currentUser = null;

  // ============ AUTH ============
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.getElementById('auth-form').style.display = 'none';
      document.getElementById('recovery-form').style.display = 'block';
      document.getElementById('auth-subtitle').textContent = 'Choose a new password';
      return;
    }
    currentUser = session?.user || null;
    if (session) { showApp(); } else { showAuth(); }
  });

  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await fetchTasks();
    renderAll();
  }
  function toggleMode() {
    isSignUp = !isSignUp;
    document.getElementById('auth-subtitle').textContent = isSignUp ? 'Create an account' : 'Sign in to continue';
    document.getElementById('auth-btn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('toggle-link').textContent = isSignUp ? 'Already have an account? Sign in' : "Don't have an account? Sign up";
    authError('');
  }
  function authError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.style.display = msg ? 'block' : 'none';
  }
  async function handleAuth() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return authError('Please fill in all fields.');
    const btn = document.getElementById('auth-btn');
    btn.disabled = true;
    const { error } = isSignUp
      ? await db.auth.signUp({ email, password })
      : await db.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    if (error) authError(error.message);
    else if (isSignUp) authError('✅ Check your email to confirm your account, then sign in.');
  }
  async function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) return authError('Type your email above first, then click "Forgot password?".');
    const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    authError(error ? error.message : '✅ Check your email for the reset link.');
  }
  async function setNewPassword() {
    const pw = document.getElementById('new-password').value;
    if (pw.length < 6) return alert('Password must be at least 6 characters.');
    const { error } = await db.auth.updateUser({ password: pw });
    if (error) return alert(error.message);
    alert('Password updated! You are now signed in.');
    document.getElementById('recovery-form').style.display = 'none';
    document.getElementById('auth-form').style.display = 'block';
  }

  // ============ DATA ============
  async function fetchTasks() {
    const { data, error } = await db.from('tasks').select('*').order('created_at', { ascending: false });
    if (error) { alert('Error loading tasks: ' + error.message + '\n\nDid you run the SQL setup in Supabase?'); tasks = []; return; }
    tasks = data;
  }
  function renderAll() { renderDashboard(); renderList(); renderKanban(); renderCalendar(); refreshFilterOptions(); }

  // ============ HELPERS ============
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const todayStr = () => new Date().toISOString().slice(0,10);
  const isOverdue = t => t.due_date && t.due_date < todayStr() && !['completed','cancelled'].includes(t.status);
  const uniqueVals = field => [...new Set(tasks.map(t => t[field]).filter(Boolean))].sort();

  function fillSelect(el, options, labels, keepFirst) {
    const first = keepFirst ? el.options[0].outerHTML : '';
    el.innerHTML = first + options.map(o => `<option value="${esc(o)}">${esc(labels ? labels[o] : o)}</option>`).join('');
  }

  function refreshFilterOptions() {
    fillSelect(document.getElementById('f-status'), STATUSES, S_LABEL, true);
    fillSelect(document.getElementById('f-priority'), PRIORITIES, P_LABEL, true);
    fillSelect(document.getElementById('f-dept'), uniqueVals('department'), null, true);
    fillSelect(document.getElementById('f-project'), uniqueVals('project'), null, true);
    ['dept','client','project'].forEach(k => {
      const field = k === 'dept' ? 'department' : k;
      document.getElementById('dl-'+k).innerHTML = uniqueVals(field).map(v => `<option value="${esc(v)}">`).join('');
    });
  }

  // ============ VIEWS ============
  function switchView(name, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ----- LIST -----
  function renderList() {
    const q = document.getElementById('f-search').value.toLowerCase();
    const fs = document.getElementById('f-status').value;
    const fp = document.getElementById('f-priority').value;
    const fd = document.getElementById('f-dept').value;
    const fpr = document.getElementById('f-project').value;

    const filtered = tasks.filter(t =>
      (!q || (t.title + ' ' + (t.description||'') + ' ' + (t.tags||[]).join(' ')).toLowerCase().includes(q)) &&
      (!fs || t.status === fs) && (!fp || t.priority === fp) &&
      (!fd || t.department === fd) && (!fpr || t.project === fpr)
    );

    const list = document.getElementById('items-list');
    if (!filtered.length) { list.innerHTML = '<p class="empty">No tasks match.<br>Tap + to add one!</p>'; return; }

    list.innerHTML = filtered.map(t => `
      <div class="card" style="border-left-color:var(--${t.priority})" onclick="openModal('${t.id}')">
        <div class="card-top">
          <span class="card-title ${t.status==='completed'?'done':''}">${esc(t.title)}</span>
          <span class="badge" style="background:var(--${t.status})">${S_LABEL[t.status]}</span>
        </div>
        <div class="badges">
          <span class="badge" style="background:var(--${t.priority})">${P_LABEL[t.priority]}</span>
          ${t.department ? `<span class="badge outline">🏢 ${esc(t.department)}</span>` : ''}
          ${t.client ? `<span class="badge outline">👤 ${esc(t.client)}</span>` : ''}
          ${t.project ? `<span class="badge outline">📁 ${esc(t.project)}</span>` : ''}
          ${(t.tags||[]).map(tag => `<span class="badge outline">#${esc(tag)}</span>`).join('')}
        </div>
        ${t.due_date ? `<div class="card-due ${isOverdue(t)?'overdue':''}">📅 ${t.due_date}${isOverdue(t)?' — OVERDUE':''}</div>` : ''}
      </div>`).join('');
  }

  // ----- KANBAN -----
  function renderKanban() {
    const board = document.getElementById('kanban-board');
    board.innerHTML = STATUSES.map(s => {
      const col = tasks.filter(t => t.status === s);
      return `
      <div class="kanban-col" data-status="${s}" ondragover="kanbanOver(event)" ondragleave="kanbanLeave(event)" ondrop="kanbanDrop(event)">
        <h4><span><span class="dot" style="background:var(--${s})"></span>${S_LABEL[s]}</span><span class="count">${col.length}</span></h4>
        ${col.map(t => `
          <div class="kanban-card" draggable="true" ondragstart="kanbanDrag(event,'${t.id}')" onclick="openModal('${t.id}')">
            <div>${esc(t.title)}</div>
            <div class="kc-meta">
              <span class="badge" style="background:var(--${t.priority})">${P_LABEL[t.priority]}</span>
              ${t.due_date ? `<span class="badge outline ${isOverdue(t)?'overdue':''}">${t.due_date}</span>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
    }).join('');
  }
  function kanbanDrag(e, id) { e.dataTransfer.setData('text/plain', id); }
  function kanbanOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
  function kanbanLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  async function kanbanDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const status = e.currentTarget.dataset.status;
    const t = tasks.find(x => x.id === id);
    if (!t || t.status === status) return;
    t.status = status; renderAll();
    await db.from('tasks').update({ status, updated_at: new Date().toISOString() }).eq('id', id);
  }

  // ----- CALENDAR -----
  function calMove(n) { calDate.setMonth(calDate.getMonth() + n); renderCalendar(); }
  function renderCalendar() {
    const y = calDate.getFullYear(), m = calDate.getMonth();
    document.getElementById('cal-title').textContent = calDate.toLocaleString('en', { month: 'long', year: 'numeric' });
    const first = new Date(y, m, 1);
    const startDow = first.getDay();
    const grid = document.getElementById('cal-grid');
    const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
    const start = new Date(y, m, 1 - startDow);
    for (let i = 0; i < 42; i++) {
      const d = new Date(start); d.setDate(start.getDate() + i);
      const ds = d.toISOString().slice(0,10);
      const dayTasks = tasks.filter(t => t.due_date === ds && !['cancelled'].includes(t.status));
      html += `
        <div class="cal-day ${d.getMonth() !== m ? 'other' : ''} ${ds === todayStr() ? 'today' : ''}">
          <div class="d">${d.getDate()}</div>
          ${dayTasks.slice(0,3).map(t => `<div class="cal-task" style="background:var(--${t.priority})" onclick="openModal('${t.id}')">${esc(t.title)}</div>`).join('')}
          ${dayTasks.length > 3 ? `<div style="font-size:10px;color:var(--muted)">+${dayTasks.length-3} more</div>` : ''}
        </div>`;
    }
    grid.innerHTML = html;
  }

  // ----- DASHBOARD -----
  function renderDashboard() {
    const open = tasks.filter(t => !['completed','cancelled'].includes(t.status));
    const overdue = tasks.filter(isOverdue);
    const doneWeek = tasks.filter(t => t.status === 'completed' && t.updated_at >= new Date(Date.now() - 7*864e5).toISOString());
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="num">${open.length}</div><div class="lbl">Open tasks</div></div>
      <div class="stat-card"><div class="num" style="color:#dc2626">${overdue.length}</div><div class="lbl">Overdue</div></div>
      <div class="stat-card"><div class="num" style="color:#10b981">${doneWeek.length}</div><div class="lbl">Completed (7 days)</div></div>
      <div class="stat-card"><div class="num">${tasks.length}</div><div class="lbl">Total tasks</div></div>`;

    barChart('chart-status', STATUSES.map(s => [S_LABEL[s], tasks.filter(t => t.status === s).length, `var(--${s})`]));
    barChart('chart-priority', PRIORITIES.map(p => [P_LABEL[p], open.filter(t => t.priority === p).length, `var(--${p})`]));
    const depts = uniqueVals('department');
    barChart('chart-dept', depts.length
      ? depts.map(d => [d, open.filter(t => t.department === d).length, 'var(--primary)'])
      : [['(no department)', open.length, 'var(--primary)']]);
  }
  function barChart(elId, rows) {
    const max = Math.max(1, ...rows.map(r => r[1]));
    document.getElementById(elId).innerHTML = rows.map(([label, n, color]) => `
      <div class="bar-row">
        <div class="bar-label">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${n/max*100}%;background:${color}"></div></div>
        <div class="bar-num">${n}</div>
      </div>`).join('');
  }

  // ============ MODAL / CRUD ============
  function openModal(id) {
    editingId = id || null;
    const t = id ? tasks.find(x => x.id === id) : null;
    document.getElementById('modal-title').textContent = t ? 'Edit Task' : 'New Task';
    document.getElementById('t-title').value = t?.title || '';
    document.getElementById('t-desc').value = t?.description || '';
    fillSelect(document.getElementById('t-status'), STATUSES, S_LABEL, false);
    fillSelect(document.getElementById('t-priority'), PRIORITIES, P_LABEL, false);
    document.getElementById('t-status').value = t?.status || 'pending';
    document.getElementById('t-priority').value = t?.priority || 'medium';
    document.getElementById('t-due').value = t?.due_date || '';
    document.getElementById('t-dept').value = t?.department || '';
    document.getElementById('t-client').value = t?.client || '';
    document.getElementById('t-project').value = t?.project || '';
    document.getElementById('t-tags').value = (t?.tags || []).join(', ');
    document.getElementById('btn-delete').style.display = t ? 'block' : 'none';
    document.getElementById('comments-section').style.display = t ? 'block' : 'none';
    if (t) loadComments(t.id);
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); editingId = null; }

  async function saveTask() {
    const title = document.getElementById('t-title').value.trim();
    if (!title) return alert('Title is required.');
    const payload = {
      title,
      description: document.getElementById('t-desc').value.trim() || null,
      status: document.getElementById('t-status').value,
      priority: document.getElementById('t-priority').value,
      due_date: document.getElementById('t-due').value || null,
      department: document.getElementById('t-dept').value.trim() || null,
      client: document.getElementById('t-client').value.trim() || null,
      project: document.getElementById('t-project').value.trim() || null,
      tags: document.getElementById('t-tags').value.split(',').map(s => s.trim()).filter(Boolean),
      updated_at: new Date().toISOString(),
    };
    let error;
    if (editingId) ({ error } = await db.from('tasks').update(payload).eq('id', editingId));
    else ({ error } = await db.from('tasks').insert({ ...payload, user_id: currentUser.id }));
    if (error) return alert(error.message);
    closeModal();
    await fetchTasks(); renderAll();
  }

  async function deleteTask() {
    if (!editingId || !confirm('Delete this task permanently?')) return;
    const { error } = await db.from('tasks').delete().eq('id', editingId);
    if (error) return alert(error.message);
    closeModal();
    await fetchTasks(); renderAll();
  }

  // ----- COMMENTS -----
  async function loadComments(taskId) {
    const box = document.getElementById('comments-list');
    box.innerHTML = '<p style="color:var(--muted);font-size:13px">Loading…</p>';
    const { data, error } = await db.from('task_comments').select('*').eq('task_id', taskId).order('created_at');
    if (error) { box.innerHTML = `<p style="color:#ef4444;font-size:13px">${esc(error.message)}</p>`; return; }
    box.innerHTML = data.length
      ? data.map(c => `<div class="comment">${esc(c.body)}<div class="c-date">${new Date(c.created_at).toLocaleString()}</div></div>`).join('')
      : '<p style="color:var(--muted);font-size:13px">No comments yet.</p>';
  }
  async function addComment() {
    const body = document.getElementById('c-body').value.trim();
    if (!body || !editingId) return;
    const { error } = await db.from('task_comments').insert({ task_id: editingId, user_id: currentUser.id, body });
    if (error) return alert(error.message);
    document.getElementById('c-body').value = '';
    loadComments(editingId);
  }

  // misc
  document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
  document.getElementById('c-body').addEventListener('keydown', e => { if (e.key === 'Enter') addComment(); });
</script>
</body>
</html>
